<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KG Facility Solutions — Exit Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #181818;
  --teal: #2ABFBF;
  --teal-hover: #22a0a0;
  --white: #ffffff;
  --gray: #888888;
  --gray-light: #cccccc;
  --gray-dark: #555555;
  --border: #2e2e2e;
  --error: #ff5a5a;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 1rem;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── SCREENS ────────────────────────────────────────── */
.screen { display: none; min-height: 100dvh; flex-direction: column; }
.screen.active { display: flex; }

/* ── HERO ───────────────────────────────────────────── */
.hero {
  padding: 36px 24px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.hero__logo {
  max-width: 160px;
  height: auto;
  display: block;
  margin: 0 auto 24px;
}
.hero__title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.1;
}
.hero__subtitle {
  margin-top: 10px;
  font-size: 0.88rem;
  color: var(--gray);
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* ── LANGUAGE SCREEN ────────────────────────────────── */
.lang-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px 52px;
  gap: 14px;
}
.lang-prompt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 6px;
}
.lang-btn {
  width: 100%;
  max-width: 340px;
  padding: 22px 28px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: border-color 0.18s, color 0.18s, background 0.18s;
  text-align: center;
}
.lang-btn:hover, .lang-btn:active {
  border-color: var(--teal);
  color: var(--teal);
  background: rgba(42,191,191,0.06);
}

/* ── SURVEY HEADER ──────────────────────────────────── */
.survey-header {
  padding: 20px 24px 0;
  flex-shrink: 0;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
.progress-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray);
}
.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 2px;
  transition: width 0.35s ease;
}

/* ── QUESTION BODY ──────────────────────────────────── */
.question-body {
  flex: 1;
  padding: 28px 24px 130px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
}
.question-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.42rem;
  font-weight: 600;
  line-height: 1.32;
}
.scale-descriptor {
  font-size: 0.8rem;
  color: var(--gray);
  margin-top: -14px;
}

/* ── SCALE BUTTONS ──────────────────────────────────── */
.scale-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.scale-btn {
  aspect-ratio: 1;
  min-height: 52px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.scale-btn:hover { border-color: var(--teal); }
.scale-btn.selected {
  background: var(--teal);
  border-color: var(--teal);
  color: #0d0d0d;
  font-weight: 700;
}

/* ── OPTION BUTTONS ─────────────────────────────────── */
.option-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  width: 100%;
  padding: 18px 20px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.option-btn:hover { border-color: var(--teal); }
.option-btn.selected {
  background: var(--teal);
  border-color: var(--teal);
  color: #0d0d0d;
  font-weight: 700;
}

/* ── CHECKBOXES ─────────────────────────────────────── */
.checkbox-list { display: flex; flex-direction: column; gap: 10px; }
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 16px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.checkbox-row:hover { border-color: var(--teal); }
.checkbox-row.checked {
  border-color: var(--teal);
  background: rgba(42,191,191,0.07);
}
.checkbox-box {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  border: 2px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.checkbox-row.checked .checkbox-box {
  background: var(--teal);
  border-color: var(--teal);
}
.check-icon { display: none; }
.checkbox-row.checked .check-icon { display: block; }
.checkbox-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 500;
}

/* ── FIELDS ─────────────────────────────────────────── */
.field-label {
  font-size: 0.8rem;
  color: var(--gray);
  margin-bottom: -14px;
}
.comment-field {
  width: 100%;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  line-height: 1.5;
  padding: 14px 16px;
  resize: vertical;
  min-height: 88px;
  outline: none;
  transition: border-color 0.15s;
}
.comment-field:focus { border-color: var(--teal); }
.comment-field::placeholder { color: var(--gray-dark); }
.textarea-lg { min-height: 150px; }

/* ── ERROR ──────────────────────────────────────────── */
.error-msg {
  font-size: 0.85rem;
  color: var(--error);
  display: none;
  margin-top: -10px;
}
.error-msg.visible { display: block; }

/* ── NAV FOOTER ─────────────────────────────────────── */
.nav-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 12px;
  padding: 14px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  z-index: 50;
  max-width: 560px;
  margin: 0 auto;
}
@media (min-width: 560px) {
  .nav-footer {
    left: 50%;
    right: auto;
    width: 560px;
    transform: translateX(-50%);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
}
.btn-back {
  padding: 14px 18px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--gray);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-back:hover { border-color: var(--gray); color: var(--white); }
.btn-next {
  flex: 1;
  padding: 16px 20px;
  background: var(--teal);
  border: none;
  border-radius: 10px;
  color: #0d0d0d;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-next:hover { background: var(--teal-hover); }

/* ── LOADING ────────────────────────────────────────── */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,13,13,0.88);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.loading-overlay.visible { display: flex; }
.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
.loading-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--gray);
  text-transform: uppercase;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SUCCESS ────────────────────────────────────────── */
.success-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
  gap: 22px;
}
.success-icon {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  border: 2px solid var(--teal);
  background: rgba(42,191,191,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}
.success-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.success-msg {
  font-size: 0.95rem;
  color: var(--gray-light);
  line-height: 1.65;
  max-width: 300px;
}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">

// ── HELPERS ───────────────────────────────────────────────────────────────────
function tr() { return C[lang]; }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function hideError() {
  const e = document.getElementById('qError');
  if (e) e.classList.remove('visible');
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function selectLanguage(l) {
  lang = l;
  answers.language = l;
  currentQ = 0;
  q6Touched = false;
  answers.q5_improvement_areas = [];
  document.getElementById('loadingText').textContent = tr().submitting;
  showScreen('screenSurvey');
  renderQuestion();
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = Math.round((currentQ / TOTAL_Q) * 100);
  document.getElementById('progressLabel').textContent = tr().progressOf(currentQ + 1, TOTAL_Q);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderQuestion() {
  updateProgress();
  const t = tr();
  const qData = t.questions[currentQ];
  const body = document.getElementById('questionBody');
  body.innerHTML = '';

  document.getElementById('btnBack').style.display = currentQ > 0 ? 'block' : 'none';
  document.getElementById('btnBack').textContent = t.back;
  document.getElementById('btnNext').textContent = currentQ === TOTAL_Q - 1 ? t.submit : t.next;

  if (qData.type === 'scale')    renderScale(body, qData);
  if (qData.type === 'checkbox') renderCheckbox(body, qData);
  if (qData.type === 'option')   renderOption(body, qData);
  if (qData.type === 'textarea') renderTextarea(body, qData);

  window.scrollTo(0, 0);
}

function addQuestionText(parent, text) {
  const p = mk('p', 'question-text');
  p.textContent = text;
  parent.appendChild(p);
}

function addError(parent) {
  const e = mk('p', 'error-msg');
  e.id = 'qError';
  e.textContent = tr().required;
  parent.appendChild(e);
}

function addComment(parent, commentKey, label) {
  const lbl = mk('p', 'field-label');
  lbl.textContent = label;
  parent.appendChild(lbl);
  const ta = mk('textarea', 'comment-field');
  ta.placeholder = label;
  ta.value = answers[commentKey] || '';
  ta.addEventListener('input', () => { answers[commentKey] = ta.value; });
  parent.appendChild(ta);
}

function renderScale(parent, qData) {
  addQuestionText(parent, qData.text);

  if (qData.scale) {
    const d = mk('p', 'scale-descriptor');
    d.textContent = qData.scale;
    parent.appendChild(d);
  }

  const row1 = mk('div', 'scale-row');
  const row2 = mk('div', 'scale-row');
  for (let i = 1; i <= 10; i++) {
    const btn = mk('button', 'scale-btn');
    btn.textContent = i;
    if (answers[qData.scoreKey] === i) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      answers[qData.scoreKey] = i;
      parent.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      hideError();
    });
    (i <= 5 ? row1 : row2).appendChild(btn);
  }
  parent.appendChild(row1);
  parent.appendChild(row2);
  addError(parent);
  addComment(parent, qData.commentKey, qData.commentLabel);
}

function renderCheckbox(parent, qData) {
  addQuestionText(parent, qData.text);

  const list = mk('div', 'checkbox-list');
  qData.options.forEach(opt => {
    const row = mk('div', 'checkbox-row');
    if (answers[qData.areasKey].includes(opt)) row.classList.add('checked');

    const box = mk('div', 'checkbox-box');
    box.innerHTML = `<svg class="check-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M2.5 6.5L5.5 9.5L10.5 3.5" stroke="#0d0d0d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const label = mk('span', 'checkbox-text');
    label.textContent = opt;

    row.appendChild(box);
    row.appendChild(label);
    row.addEventListener('click', () => {
      const idx = answers[qData.areasKey].indexOf(opt);
      if (idx === -1) { answers[qData.areasKey].push(opt); row.classList.add('checked'); }
      else            { answers[qData.areasKey].splice(idx, 1); row.classList.remove('checked'); }
    });
    list.appendChild(row);
  });
  parent.appendChild(list);
  addComment(parent, qData.commentKey, qData.commentLabel);
}

function renderOption(parent, qData) {
  addQuestionText(parent, qData.text);

  const list = mk('div', 'option-list');

  // Values for each button index
  const q6Vals = [true, false, null];
  const q7Vals = ['yes', 'no', 'maybe'];

  qData.buttons.forEach((label, idx) => {
    const btn = mk('button', 'option-btn');
    btn.textContent = label;

    // Restore selected state when going back
    if (qData.qKey === 'q6' && q6Touched) {
      if (answers.q6_needed_support === q6Vals[idx]) btn.classList.add('selected');
    } else if (qData.qKey === 'q7') {
      if (answers.q7_platform_usage === q7Vals[idx]) btn.classList.add('selected');
    }

    btn.addEventListener('click', () => {
      parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      if (qData.qKey === 'q6') {
        answers.q6_needed_support = q6Vals[idx];
        q6Touched = true;
      } else {
        answers.q7_platform_usage = q7Vals[idx];
      }
      hideError();
    });
    list.appendChild(btn);
  });
  parent.appendChild(list);
  addError(parent);

  if (qData.commentKey) {
    addComment(parent, qData.commentKey, qData.commentLabel);
  }
}

function renderTextarea(parent, qData) {
  addQuestionText(parent, qData.text);
  const ta = mk('textarea', 'comment-field textarea-lg');
  ta.placeholder = qData.placeholder;
  ta.value = answers[qData.textKey] || '';
  ta.addEventListener('input', () => { answers[qData.textKey] = ta.value; });
  parent.appendChild(ta);
}

// ── VALIDATION ────────────────────────────────────────────────────────────────
function validate() {
  let ok = true;
  switch (currentQ) {
    case 0: if (!answers.q1_general_experience) ok = false; break;
    case 1: if (!answers.q2_corporate_response) ok = false; break;
    case 2: if (!answers.q3_training_score)     ok = false; break;
    case 3: if (!answers.q4_info_access)        ok = false; break;
    case 5: if (!q6Touched)                     ok = false; break;
    case 6: if (!answers.q7_platform_usage)     ok = false; break;
  }
  if (!ok) {
    const e = document.getElementById('qError');
    if (e) e.classList.add('visible');
  }
  return ok;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goNext() {
  if (!validate()) return;
  if (currentQ < TOTAL_Q - 1) { currentQ++; renderQuestion(); }
  else                         { submitSurvey(); }
}

function goBack() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
async function submitSurvey() {
  document.getElementById('loadingOverlay').classList.add('visible');

  const payload = {
    language:               answers.language,
    q1_general_experience:  answers.q1_general_experience,
    q1_comment:             answers.q1_comment  || null,
    q2_corporate_response:  answers.q2_corporate_response,
    q2_comment:             answers.q2_comment  || null,
    q3_training_score:      answers.q3_training_score,
    q3_comment:             answers.q3_comment  || null,
    q4_info_access:         answers.q4_info_access,
    q4_comment:             answers.q4_comment  || null,
    q5_improvement_areas:   answers.q5_improvement_areas.length ? answers.q5_improvement_areas : null,
    q5_comment:             answers.q5_comment  || null,
    q6_needed_support:      q6Touched ? answers.q6_needed_support : null,
    q6_comment:             answers.q6_comment  || null,
    q7_platform_usage:      answers.q7_platform_usage || null,
    q8_leadership_advice:   answers.q8_leadership_advice || null,
    submitted_at:           new Date().toISOString()
  };

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });

    document.getElementById('loadingOverlay').classList.remove('visible');

    if (res.ok) {
      const t = tr();
      document.getElementById('successTitle').textContent = t.successTitle;
      document.getElementById('successMsg').textContent   = t.successMsg;
      showScreen('screenSuccess');
    } else {
      const body = await res.text().catch(() => '');
      alert(`Submission failed (${res.status}). Please try again.\n\n${body}`);
    }
  } catch (err) {
    document.getElementById('loadingOverlay').classList.remove('visible');
    alert('Network error. Please check your connection and try again.');
  }
}
</script>
